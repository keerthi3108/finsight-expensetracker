# Deploy backend on Render: https://render.com
# Dashboard → New → Blueprint → connect this repo (or create Web Service manually)

services:
  - type: web
    name: finsight-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
